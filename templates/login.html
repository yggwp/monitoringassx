<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AssistX POC Monitoring</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/styles.css">
    <style>
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            position: relative;
            z-index: 10;
        }
        .login-card {
            width: 100%;
            max-width: 400px;
            padding: 2.5rem;
            text-align: center;
        }
        .login-logo {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }
        .login-subtitle {
            color: var(--text-muted);
            margin-bottom: 2rem;
        }
        .login-form {
            text-align: left;
        }
        .login-form .form-group {
            margin-bottom: 1.5rem;
        }
        .btn-login {
            width: 100%;
            padding: 1rem;
            font-size: 1rem;
            margin-top: 1rem;
        }
        .error-message {
            background: rgba(220, 53, 69, 0.1);
            color: #ff6b81;
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            border: 1px solid rgba(220, 53, 69, 0.2);
            text-align: center;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="bg-blobs">
        <div class="blob shape-1"></div>
        <div class="blob shape-2"></div>
        <div class="blob shape-3"></div>
    </div>

    <div class="login-container">
        <div class="glass-panel login-card">
            <h1 class="login-logo">AssistX <span class="accent-text">POC</span></h1>
            <p class="login-subtitle">System Administrator Login</p>
            
            {% if error %}
            <div class="error-message">
                {{ error }}
            </div>
            {% endif %}

            <form class="login-form" method="POST" action="/login">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" name="username" placeholder="Enter your username" required autofocus>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="password" placeholder="Enter your password" required>
                </div>
                <button type="submit" class="btn-primary btn-login">Secure Login</button>
            </form>
        </div>
    </div>
</body>
</html>
